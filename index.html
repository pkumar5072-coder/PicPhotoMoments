<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedora Weddings | Cinematic Excellence</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background-color: #050505; color: #ffffff; overflow-x: hidden; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 8%; background: rgba(0, 0, 0, 0.95);
            position: fixed; width: 100%; top: 0; z-index: 2000; border-bottom: 1px solid #1a1a1a;
            backdrop-filter: blur(15px);
        }

        /* HATKE STYLISH LOGO SECTION */
        .logo { 
            font-family: 'Great Vibes', cursive; /* Stylish Cursive Font */
            font-size: 42px; 
            color: #f39c12;
            background: linear-gradient(to bottom, #f39c12 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: capitalize; /* Sirf pehla letter bada */
            letter-spacing: 1px;
        }
        .logo span {
            font-family: 'Cinzel', serif; /* Royal Serif Font */
            font-size: 16px;
            color: #ffffff;
            -webkit-text-fill-color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 5px;
            display: block;
            margin-top: -10px;
            font-weight: 400;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('hero-bg.jpg'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(35px, 8vw, 75px); color: #fff; text-transform: uppercase; line-height: 1.1; margin-bottom: 25px; font-weight: 700; letter-spacing: 3px; }
        .hero-btn { padding: 18px 45px; background: #f39c12; color: #000; text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; border: 1px solid #f39c12; }
        .hero-btn:hover { background: transparent; color: #f39c12; }

        .portfolio-section { padding: 100px 5%; background: #080808; text-align: center; }
        .filters { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; }
        
        .filter-btn {
            background: transparent; color: #888; border: 1px solid #222; padding: 10px 25px;
            cursor: pointer; transition: 0.3s; font-weight: 400; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
        }
        .filter-btn.active { background: #f39c12; color: #000; border-color: #f39c12; font-weight: 700; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; }
        .gallery-item { overflow: hidden; height: 400px; background: #000; border: 1px solid #111; position: relative; transition: 0.5s; }
        .gallery-item:hover { border-color: #f39c12; }
        .gallery-item img, .gallery-item iframe { width: 100%; height: 100%; object-fit: cover; border: none; cursor: zoom-in; }

        footer { padding: 80px 5%; background: #000; text-align: center; border-top: 1px solid #1a1a1a; }
        .footer-logo { font-family: 'Great Vibes', cursive; font-size: 50px; color: #f39c12; margin-bottom: 20px; }
        .social-links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 30px; }
        
        .social-btn { 
            text-decoration: none; color: #fff; padding: 12px 30px; border-radius: 2px;
            font-weight: bold; transition: 0.3s; font-size: 12px; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px; border: 1px solid #333;
        }
        .btn-wa { background: #128c7e; border-color: #128c7e; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border: none; }
        .btn-fb { background: #1877F2; border-color: #1877F2; }
        .btn-call { border-color: #f39c12; color: #f39c12; }

        @media (max-width: 768px) { .hero h1 { font-size: 35px; } .logo { font-size: 35px; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">Wedora<span>Weddings</span></div>
    </header>

    <section class="hero">
        <h1>Cinematic Stories<br>Told With Love</h1>
        <a href="#portfolio" class="hero-btn">View Our Diary</a>
    </section>

    <section id="portfolio" class="portfolio-section">
        <h2 style="font-family: 'Cinzel', serif; color:#f39c12; margin-bottom: 50px; font-size: 35px; letter-spacing: 5px;">THE PORTFOLIO</h2>
        <div class="filters">
            <button class="filter-btn active" onclick="changeCategory('all', this)">Everything</button>
            <button class="filter-btn" onclick="changeCategory('wedding', this)">Wedding</button>
            <button class="filter-btn" onclick="changeCategory('pre', this)">Pre-Wedding</button>
            <button class="filter-btn" onclick="changeCategory('eng', this)">Engagement</button>
            <button class="filter-btn" onclick="changeCategory('haldi', this)">Haldi</button>
            <button class="filter-btn" onclick="changeCategory('meh', this)">Mehndi</button>
        </div>
        <div class="gallery-grid" id="gallery"></div>
    </section>

    <footer>
        <div class="footer-logo">Wedora Weddings</div>
        <p style="color:#888; letter-spacing: 2px;">Capturing your most precious moments since 2026</p>
        <p style="color:#f39c12; margin-top: 10px; font-weight: bold;">+91 8826540642</p>
        <div class="social-links">
            <a href="tel:+918826540642" class="social-btn btn-call"><i class="fas fa-phone"></i> CALL</a>
            <a href="https://wa.me/918826540642" target="_blank" class="social-btn btn-wa"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
            <a href="https://www.instagram.com/wedora_weddings.1" target="_blank" class="social-btn btn-insta"><i class="fab fa-instagram"></i> INSTAGRAM</a>
            <a href="https://www.facebook.com/share/1BDmxtijCS/" target="_blank" class="social-btn btn-fb"><i class="fab fa-facebook-f"></i> FACEBOOK</a>
        </div>
        <p style="margin-top: 60px; color:#444; font-size: 10px; letter-spacing: 3px;">© 2026 WEDORA WEDDINGS | NEW DELHI</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>
    <script>
        const counts = { wedding: 5, pre: 23, eng: 2, haldi: 1, meh: 1, corp: 1 };
        const videos = [ { id: "7sUVsH9w1vk", cat: "wedding" } ];

        let currentCat = 'all';

        function render() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            const catsToLoad = currentCat === 'all' ? Object.keys(counts) : [currentCat];
            catsToLoad.forEach(cat => {
                // Photos
                for (let i = 1; i <= counts[cat]; i++) {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML = `<a href="./${cat}${i}.jpg" data-lightbox="gallery-group"><img src="./${cat}${i}.jpg" loading="lazy" onerror="this.parentElement.parentElement.style.display='none'"></a>`;
                    gallery.appendChild(div);
                }
                // Videos
                videos.filter(v => v.cat === cat).forEach(vid => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid.id}" allowfullscreen></iframe>`;
                    gallery.appendChild(div);
                });
            });
        }

        function changeCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }
        render();
    </script>
</body>
</html>
