<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicPhotoMoments | Fast & Premium Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        body { background-color: #0b0b0b; color: #fff; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(0, 0, 0, 0.98);
            position: fixed; width: 100%; top: 0; z-index: 2000; border-bottom: 1px solid #222;
        }
        .logo { font-size: 22px; font-weight: bold; color: #f39c12; text-transform: uppercase; }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('hero-bg.jpg'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .hero h1 { font-size: 50px; color: #fff; text-transform: uppercase; margin-bottom: 20px; }

        .portfolio-section { padding: 100px 5% 50px; text-align: center; }
        .filters, .sub-filters { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .sub-filters { display: none; margin-bottom: 40px; }

        .filter-btn {
            background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px 22px;
            cursor: pointer; border-radius: 5px; transition: 0.3s; font-weight: bold;
        }
        .filter-btn.active { background: #f39c12; color: #000; border-color: #f39c12; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; min-height: 200px; }
        .gallery-item { border-radius: 10px; overflow: hidden; height: 350px; background: #111; animation: fadeIn 0.5s ease-in; }
        .gallery-item img, .gallery-item iframe { width: 100%; height: 100%; object-fit: cover; border: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        footer { padding: 60px 5%; background: #000; text-align: center; border-top: 1px solid #222; }
        .social-btn { text-decoration: none; color: #fff; padding: 12px 25px; border-radius: 50px; font-weight: bold; display: inline-block; margin: 8px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PicPhotoMoments</div>
    </header>

    <section id="home" class="hero">
        <h1>Make a Wonderful Story for Your Wedding</h1>
    </section>

    <section class="portfolio-section">
        <h2 style="color:#f39c12; margin-bottom: 30px;">The Visual Diary</h2>
        
        <div class="filters">
            <button class="filter-btn active" onclick="loadGallery('all')">All Work</button>
            <button class="filter-btn" onclick="loadGallery('wedding')">Wedding</button>
            <button class="filter-btn" onclick="loadGallery('pre')">Pre-Wedding</button>
            <button class="filter-btn" onclick="loadGallery('eng')">Engagement</button>
            <button class="filter-btn" onclick="loadGallery('haldi')">Haldi</button>
            <button class="filter-btn" onclick="loadGallery('meh')">Mehndi</button>
            <button class="filter-btn" onclick="loadGallery('corp')">Corporate</button>
        </div>

        <div class="sub-filters" id="type-box">
            <button class="filter-btn active" id="btn-all-t">Everything</button>
            <button class="filter-btn" id="btn-photo">Photos Only</button>
            <button class="filter-btn" id="btn-video">Videos Only</button>
        </div>

        <div class="gallery-grid" id="gallery">
            </div>
    </section>

    <footer>
        <div class="social-links">
            <a href="tel:+918826540642" class="social-btn" style="background:#f39c12; color:#000;">📞 Call</a>
            <a href="https://wa.me/918826540642" target="_blank" class="social-btn" style="background:#25D366;">WhatsApp</a>
            <a href="https://www.instagram.com/picphotomoments" target="_blank" class="social-btn" style="background:#E1306C;">Instagram</a>
        </div>
    </footer>

    <script>
        // --- प्रदीप जी, यहाँ आपको बस संख्या लिखनी है कि कितनी फोटो हैं ---
        // उदाहरण: अगर Wedding की ५ फोटो हैं, तो यहाँ ५ लिखें। 
        const count = {
            wedding: 5,  // आपकी जितनी फोटो हैं बस वो नंबर लिख दें
            pre: 4,      
            eng: 2,
            haldi: 3,
            meh: 2,
            corp: 1
        };

        // YouTube Videos की लिस्ट
        const videos = [
            { id: "AbCdEf123", cat: "wedding" }
        ];

        const gallery = document.getElementById('gallery');
        const typeBox = document.getElementById('type-box');

        function loadGallery(category, type = 'all-t') {
            gallery.innerHTML = ''; // पुराना कचरा साफ़
            
            // Buttons Active State
            document.querySelectorAll('.filters .filter-btn').forEach(b => {
                b.classList.toggle('active', b.innerText.toLowerCase().includes(category));
            });

            if(category === 'all') {
                typeBox.style.display = 'none';
                Object.keys(count).forEach(c => renderItems(c, 'all-t'));
            } else {
                typeBox.style.display = 'flex';
                renderItems(category, type);
            }
        }

        function renderItems(cat, type) {
            // Photos लोड करना
            if(type === 'all-t' || type === 'photo') {
                for(let i=1; i <= count[cat]; i++) {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML = `<img src="${cat}${i}.jpg" alt="Photography">`;
                    gallery.appendChild(div);
                }
            }
            // Videos लोड करना
            if(type === 'all-t' || type === 'video') {
                videos.filter(v => v.cat === cat).forEach(vid => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid.id}" allowfullscreen></iframe>`;
                    gallery.appendChild(div);
                });
            }
        }

        // Sub-filter clicks
        document.getElementById('btn-all-t').onclick = () => {
            const cat = document.querySelector('.filters .active').innerText.toLowerCase().replace('-','');
            loadGallery(cat, 'all-t');
        };
        document.getElementById('btn-photo').onclick = () => {
            const cat = document.querySelector('.filters .active').innerText.toLowerCase().replace('-','');
            loadGallery(cat, 'photo');
        };
        document.getElementById('btn-video').onclick = () => {
            const cat = document.querySelector('.filters .active').innerText.toLowerCase().replace('-','');
            loadGallery(cat, 'video');
        };

        // Initial Load
        loadGallery('all');
    </script>
</body>
</html>
