<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicPhotoMoments | Luxury Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background-color: #050505; color: #ffffff; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(0, 0, 0, 0.95);
            position: fixed; width: 100%; top: 0; z-index: 2000; border-bottom: 1px solid #1a1a1a;
        }
        .logo { font-size: 26px; font-weight: 800; color: #f39c12; text-transform: uppercase; letter-spacing: 2px; }

        .portfolio-section { padding: 120px 5% 50px; text-align: center; }
        .filters { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; }
        
        .filter-btn {
            background: #111; color: #888; border: 1px solid #222; padding: 12px 25px;
            cursor: pointer; transition: 0.3s; font-weight: 600; text-transform: uppercase; font-size: 13px;
        }
        .filter-btn.active { background: #f39c12; color: #000; border-color: #f39c12; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .gallery-item { border-radius: 8px; overflow: hidden; height: 350px; background: #111; border: 1px solid #222; position: relative; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; cursor: zoom-in; }
        .gallery-item img:hover { transform: scale(1.05); }

        footer { padding: 60px 5%; background: #000; text-align: center; border-top: 1px solid #111; }
        .social-links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        
        /* Icons ke Colors */
        .social-btn { 
            text-decoration: none; color: #fff; padding: 12px 25px; 
            border-radius: 50px; font-weight: bold; display: flex; align-items: center; gap: 10px; 
            transition: 0.3s; font-size: 14px;
        }
        .btn-call { background: #f39c12; color: #000; }
        .btn-wa { background: #25D366; }
        .btn-insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-fb { background: #1877F2; }

        .social-btn:hover { transform: translateY(-5px); opacity: 0.9; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PicPhotoMoments</div>
    </header>

    <section class="portfolio-section">
        <h2 style="color:#f39c12; margin-bottom: 40px; font-size: 35px;">The Visual Diary</h2>
        
        <div class="filters" id="cat-filters">
            <button class="filter-btn active" onclick="changeCategory('all', this)">All Work</button>
            <button class="filter-btn" onclick="changeCategory('wedding', this)">Wedding</button>
            <button class="filter-btn" onclick="changeCategory('pre', this)">Pre-Wedding</button>
            <button class="filter-btn" onclick="changeCategory('eng', this)">Engagement</button>
            <button class="filter-btn" onclick="changeCategory('haldi', this)">Haldi</button>
            <button class="filter-btn" onclick="changeCategory('meh', this)">Mehndi</button>
            <button class="filter-btn" onclick="changeCategory('corp', this)">Corporate</button>
        </div>

        <div class="gallery-grid" id="gallery"></div>
    </section>

    <footer>
        <p style="color:#f39c12; margin-bottom: 10px; font-size: 18px;">Let's Create Magic Together</p>
        <div class="social-links">
            <a href="tel:+918826540642" class="social-btn btn-call"><i class="fas fa-phone"></i> Call Now</a>
            <a href="https://wa.me/918826540642" target="_blank" class="social-btn btn-wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="https://www.instagram.com/picphotomoments" target="_blank" class="social-btn btn-insta"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://www.facebook.com/share/1Cr6R4dBXg/" target="_blank" class="social-btn btn-fb"><i class="fab fa-facebook-f"></i> Facebook</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

    <script>
        const counts = { 
            wedding: 5, 
            pre: 23, // Pradeep ji, maine yahan 23 kar diya hai
            eng: 2, 
            haldi: 1, 
            meh: 1, 
            corp: 1 
        };

        let currentCat = 'all';

        function render() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            const catsToLoad = currentCat === 'all' ? Object.keys(counts) : [currentCat];
            
            catsToLoad.forEach(cat => {
                for (let i = 1; i <= counts[cat]; i++) {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML = `
                        <a href="${cat}${i}.jpg" data-lightbox="gallery" data-title="PicPhotoMoments Portfolio">
                            <img src="${cat}${i}.jpg" loading="lazy" onerror="this.style.display='none'">
                        </a>`;
                    gallery.appendChild(div);
                }
            });
        }

        function changeCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('#cat-filters .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        render();
    </script>
</body>
</html>
