<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicPhotoMoments | Luxury Cinematic Stories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background-color: #050505; color: #ffffff; overflow-x: hidden; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(0, 0, 0, 0.95);
            position: fixed; width: 100%; top: 0; z-index: 2000; border-bottom: 1px solid #1a1a1a;
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 26px; font-weight: 800; color: #f39c12; text-transform: uppercase; letter-spacing: 2px; }

        /* HERO SECTION - REINSTATED */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('hero-bg.jpg'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .hero h1 { font-size: clamp(35px, 8vw, 70px); color: #fff; text-transform: uppercase; font-weight: 900; margin-bottom: 20px; }
        .hero-btn { padding: 18px 45px; background: #f39c12; color: #000; text-decoration: none; font-weight: bold; text-transform: uppercase; }

        .portfolio-section { padding: 100px 5%; background: #080808; text-align: center; }
        .filters, .sub-filters { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .sub-filters { display: none; margin-bottom: 40px; background: #111; padding: 20px; border-radius: 5px; }
        
        .filter-btn {
            background: transparent; color: #888; border: 1px solid #333; padding: 12px 25px;
            cursor: pointer; transition: 0.3s; font-weight: 600; text-transform: uppercase; font-size: 13px;
        }
        .filter-btn.active { background: #f39c12; color: #000; border-color: #f39c12; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .gallery-item { border-radius: 5px; overflow: hidden; height: 380px; background: #111; border: 1px solid #1a1a1a; animation: fadeIn 0.6s ease; }
        .gallery-item img, .gallery-item iframe { width: 100%; height: 100%; object-fit: cover; border: none; cursor: zoom-in; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { padding: 80px 5%; background: #000; text-align: center; border-top: 1px solid #1a1a1a; }
        .social-links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 30px; }
        .social-btn { 
            text-decoration: none; color: #fff; padding: 15px 30px; border-radius: 50px; 
            font-weight: bold; display: flex; align-items: center; gap: 10px; transition: 0.3s; 
        }
        .btn-call { background: #f39c12; color: #000; }
        .btn-wa { background: #25D366; }
        .btn-insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-fb { background: #1877F2; }

        @media (max-width: 768px) { .hero h1 { font-size: 40px; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">PicPhotoMoments</div>
    </header>

    <section id="home" class="hero">
        <h1>Make a Wonderful Story<br>For Your Wedding</h1>
        <a href="#portfolio" class="hero-btn">Explore Portfolio</a>
    </section>

    <section id="portfolio" class="portfolio-section">
        <h2 style="color:#f39c12; margin-bottom: 40px; font-size: 35px; font-weight: 800;">THE VISUAL DIARY</h2>
        
        <div class="filters" id="cat-filters">
            <button class="filter-btn active" onclick="changeCategory('all', this)">All Work</button>
            <button class="filter-btn" onclick="changeCategory('wedding', this)">Wedding</button>
            <button class="filter-btn" onclick="changeCategory('pre', this)">Pre-Wedding</button>
            <button class="filter-btn" onclick="changeCategory('eng', this)">Engagement</button>
            <button class="filter-btn" onclick="changeCategory('haldi', this)">Haldi</button>
            <button class="filter-btn" onclick="changeCategory('meh', this)">Mehndi</button>
            <button class="filter-btn" onclick="changeCategory('corp', this)">Corporate</button>
        </div>

        <div class="sub-filters" id="type-box">
            <button class="filter-btn active" onclick="changeType('all-t', this)">Everything</button>
            <button class="filter-btn" onclick="changeType('photo', this)">Photos Only</button>
            <button class="filter-btn" onclick="changeType('video', this)">Videos Only</button>
        </div>

        <div class="gallery-grid" id="gallery"></div>
    </section>

    <footer>
        <h2 style="color:#f39c12; margin-bottom: 10px;">Contact Us</h2>
        <p>Email: picphotomoments@gmail.com | Phone: 8826540642</p>
        <div class="social-links">
            <a href="tel:+918826540642" class="social-btn btn-call"><i class="fas fa-phone"></i> CALL</a>
            <a href="https://wa.me/918826540642" target="_blank" class="social-btn btn-wa"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
            <a href="https://www.instagram.com/picphotomoments" target="_blank" class="social-btn btn-insta"><i class="fab fa-instagram"></i> INSTAGRAM</a>
            <a href="https://www.facebook.com/share/1Cr6R4dBXg/" target="_blank" class="social-btn btn-fb"><i class="fab fa-facebook-f"></i> FACEBOOK</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

    <script>
        const counts = { 
            wedding: 5, 
            pre: 23, // Pre-Wedding set to 23
            eng: 2, 
            haldi: 1, 
            meh: 1, 
            corp: 1 
        };

        const videos = [ { id: "AbCdEf123", cat: "wedding" } ];

        let currentCat = 'all';
        let currentType = 'all-t';

        function render() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            const catsToLoad = currentCat === 'all' ? Object.keys(counts) : [currentCat];
            
            catsToLoad.forEach(cat => {
                // Photos
                if (currentType === 'all-t' || currentType === 'photo') {
                    for (let i = 1; i <= counts[cat]; i++) {
                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        item.innerHTML = `<a href="${cat}${i}.jpg" data-lightbox="gallery-group"><img src="${cat}${i}.jpg" loading="lazy" onerror="this.style.display='none'"></a>`;
                        gallery.appendChild(item);
                    }
                }
                // Videos
                if (currentType === 'all-t' || currentType === 'video') {
                    videos.filter(v => v.cat === cat).forEach(vid => {
                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        item.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid.id}" allowfullscreen></iframe>`;
                        gallery.appendChild(item);
                    });
                }
            });
        }

        function changeCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('#cat-filters .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('type-box').style.display = cat === 'all' ? 'none' : 'flex';
            render();
        }

        function changeType(type, btn) {
            currentType = type;
            document.querySelectorAll('#type-box .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        render();
    </script>
</body>
</html>
