<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicPhotoMoments | Luxury Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; scroll-behavior: smooth; }
        body { background-color: #0b0b0b; color: #fff; }

        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(0, 0, 0, 0.9);
            position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 24px; font-weight: bold; color: #f39c12; text-transform: uppercase; }

        /* Hero Section (Aapka Purana Wala Style) */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('hero-bg.jpg'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .hero h1 { font-size: 55px; margin-bottom: 10px; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero p { font-size: 20px; color: #f1f1f1; }

        /* Portfolio Section */
        .portfolio-section { padding: 100px 5%; text-align: center; }
        .filters { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        
        /* Sub-Filters (Jo category click karne par dikhenge) */
        .sub-filters { 
            display: none; /* Pehle chhupa rahega */
            justify-content: center; gap: 10px; margin-bottom: 40px; 
            padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px;
        }
        
        .filter-btn {
            background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 12px 25px;
            cursor: pointer; border-radius: 5px; transition: 0.3s; font-weight: 600;
        }
        .filter-btn.active { background: #f39c12; color: #000; border-color: #f39c12; }
        .sub-btn { font-size: 13px; background: #333; }

        /* Gallery Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .gallery-item { border-radius: 10px; overflow: hidden; height: 320px; background: #111; display: none; }
        .gallery-item img, .gallery-item iframe { width: 100%; height: 100%; object-fit: cover; border: none; }

        footer { padding: 50px; background: #000; text-align: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PicPhotoMoments</div>
    </header>

    <section class="hero">
        <h1>Make a Wonderful Story for Your Wedding</h1>
        <p>Feel Luxury Wedding Films and Cinematic Photography</p>
    </section>

    <main class="portfolio-section">
        <div class="filters" id="category-filters">
            <button class="filter-btn active" data-filter="all">All Work</button>
            <button class="filter-btn" data-filter="wedding">Wedding</button>
            <button class="filter-btn" data-filter="prewedding">Pre-Wedding</button>
            <button class="filter-btn" data-filter="engagement">Engagement</button>
            <button class="filter-btn" data-filter="birthday">Birthday</button>
            <button class="filter-btn" data-filter="corporate">Corporate</button>
            <button class="filter-btn" data-filter="mehndi">Mehndi</button>
            <button class="filter-btn" data-filter="haldi">Haldi</button>
        </div>

        <div class="sub-filters" id="type-filters">
            <button class="filter-btn sub-btn active" data-type="all-type">Show All</button>
            <button class="filter-btn sub-btn" data-type="photo">Photos</button>
            <button class="filter-btn sub-btn" data-type="video">Videos</button>
        </div>

        <div class="gallery-grid" id="gallery">
            <div class="gallery-item wedding photo all"><img src="wed1.jpg"></div>
            <div class="gallery-item wedding photo all"><img src="wed2.jpg"></div>
            <div class="gallery-item wedding photo all"><img src="wed3.jpg"></div>
            <div class="gallery-item wedding photo all"><img src="wed4.jpg"></div>
            <div class="gallery-item wedding photo all"><img src="wed5.jpg"></div>
            <div class="gallery-item wedding video all"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>

            <div class="gallery-item engagement photo all"><img src="eng1.jpg"></div>
            <div class="gallery-item engagement photo all"><img src="eng2.jpg"></div>
            <div class="gallery-item engagement photo all"><img src="eng3.jpg"></div>
            <div class="gallery-item engagement photo all"><img src="eng4.jpg"></div>
            <div class="gallery-item engagement photo all"><img src="eng5.jpg"></div>
            <div class="gallery-item engagement video all"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>

            <div class="gallery-item haldi photo all"><img src="hal1.jpg"></div>
            <div class="gallery-item mehndi photo all"><img src="meh1.jpg"></div>
        </div>
    </main>

    <footer>
        <p>Direct Number: <strong>8826540642</strong> | Email: <strong>picphotomoments@gmail.com</strong></p>
    </footer>

    <script>
        const catBtns = document.querySelectorAll('#category-filters .filter-btn');
        const typeBtns = document.querySelectorAll('#type-filters .filter-btn');
        const subFilterBar = document.getElementById('type-filters');
        const items = document.querySelectorAll('.gallery-item');

        let currentCat = 'all';
        let currentType = 'all-type';

        // Pehle baar mein sab dikhane ke liye
        window.onload = () => filterGallery();

        function filterGallery() {
            items.forEach(item => {
                const matchCat = currentCat === 'all' || item.classList.contains(currentCat);
                const matchType = currentType === 'all-type' || item.classList.contains(currentType);
                
                if(matchCat && matchType) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        }

        catBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('#category-filters .active').classList.remove('active');
                btn.classList.add('active');
                currentCat = btn.getAttribute('data-filter');

                // Agar 'All' ke alawa kuch click kiya toh 'Photos/Videos' wala option dikhao
                if(currentCat !== 'all') {
                    subFilterBar.style.display = "flex";
                } else {
                    subFilterBar.style.display = "none";
                    currentType = 'all-type';
                    typeBtns.forEach(b => b.classList.remove('active'));
                    typeBtns[0].classList.add('active');
                }
                filterGallery();
            });
        });

        typeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('#type-filters .active').classList.remove('active');
                btn.classList.add('active');
                currentType = btn.getAttribute('data-type');
                filterGallery();
            });
        });
    </script>
</body>
</html>
