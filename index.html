<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicPhotoMoments | Luxury Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        body { background-color: #0b0b0b; color: #fff; line-height: 1.6; }

        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(0, 0, 0, 0.9);
            position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 24px; font-weight: bold; color: #f39c12; text-transform: uppercase; }

        /* Hero Section */
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('hero-bg.jpg'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .hero h1 { font-size: 50px; color: #f39c12; text-transform: uppercase; letter-spacing: 2px; }

        /* Filters Section */
        .portfolio-section { padding: 100px 5%; text-align: center; }
        .filters, .sub-filters { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        
        .filter-btn {
            background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px 20px;
            cursor: pointer; border-radius: 5px; transition: 0.3s; font-weight: bold;
        }
        .filter-btn.active { background: #f39c12; color: #000; border-color: #f39c12; }
        .sub-btn { font-size: 13px; background: #222; }

        /* Gallery Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 30px; }
        .gallery-item { border-radius: 10px; overflow: hidden; height: 300px; position: relative; background: #111; }
        .gallery-item.hide { display: none; }
        .gallery-item img, .gallery-item iframe { width: 100%; height: 100%; object-fit: cover; border: none; }

        footer { padding: 40px; background: #000; text-align: center; border-top: 1px solid #222; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PicPhotoMoments</div>
    </header>

    <section class="hero">
        <h1>Cinematic Storytelling</h1>
        <p>Premium Wedding Films & Photography</p>
    </section>

    <main class="portfolio-section">
        <div class="filters" id="category-filters">
            <button class="filter-btn active" data-filter="all">All Work</button>
            <button class="filter-btn" data-filter="wedding">Wedding</button>
            <button class="filter-btn" data-filter="prewedding">Pre-Wedding</button>
            <button class="filter-btn" data-filter="engagement">Engagement</button>
            <button class="filter-btn" data-filter="birthday">Birthday</button>
            <button class="filter-btn" data-filter="corporate">Corporate</button>
            <button class="filter-btn" data-filter="mehndi">Mehndi</button>
            <button class="filter-btn" data-filter="haldi">Haldi</button>
        </div>

        <div class="sub-filters" id="type-filters">
            <button class="filter-btn sub-btn active" data-type="all-type">Show All</button>
            <button class="filter-btn sub-btn" data-type="photo">Photos Only</button>
            <button class="filter-btn sub-btn" data-type="video">Videos Only</button>
        </div>

        <div class="gallery-grid" id="gallery">
            
            <div class="gallery-item wedding photo"><img src="wed1.jpg"></div>
            <div class="gallery-item wedding photo"><img src="wed2.jpg"></div>
            <div class="gallery-item wedding video"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>

            <div class="gallery-item engagement photo"><img src="eng1.jpg"></div>
            <div class="gallery-item engagement video"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>

            <div class="gallery-item mehndi photo"><img src="meh1.jpg"></div>
            <div class="gallery-item mehndi video"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>

            <div class="gallery-item haldi photo"><img src="hal1.jpg"></div>
            <div class="gallery-item haldi video"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>

            <div class="gallery-item prewedding photo"><img src="pw1.jpg"></div>
            <div class="gallery-item prewedding video"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>

            <div class="gallery-item birthday photo"><img src="bday1.jpg"></div>
            <div class="gallery-item birthday video"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>

        </div>
    </main>

    <footer>
        <p>Contact: 8826540642 | picphotomoments@gmail.com</p>
        <p style="margin-top:10px; color:#555;">© 2026 PicPhotoMoments</p>
    </footer>

    <script>
        const catBtns = document.querySelectorAll('#category-filters .filter-btn');
        const typeBtns = document.querySelectorAll('#type-filters .filter-btn');
        const items = document.querySelectorAll('.gallery-item');

        let currentCat = 'all';
        let currentType = 'all-type';

        function filterGallery() {
            items.forEach(item => {
                const matchCat = currentCat === 'all' || item.classList.contains(currentCat);
                const matchType = currentType === 'all-type' || item.classList.contains(currentType);
                
                if(matchCat && matchType) {
                    item.classList.remove('hide');
                } else {
                    item.classList.add('hide');
                }
            });
        }

        catBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('#category-filters .active').classList.remove('active');
                btn.classList.add('active');
                currentCat = btn.getAttribute('data-filter');
                filterGallery();
            });
        });

        typeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('#type-filters .active').classList.remove('active');
                btn.classList.add('active');
                currentType = btn.getAttribute('data-type');
                filterGallery();
            });
        });
    </script>
</body>
</html>
